name: Summarizer-AI — DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ══════════════════════════════════════════════════════
  # JOB 1: HTML VALIDATION
  # ══════════════════════════════════════════════════════
  validate:
    name: "🔍 HTML Validation"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Run HTML Validation
        run: |
          echo "🔍 Validating HTML file..."
          html-validate index.html
          echo "✅ HTML validation passed!"

  # ══════════════════════════════════════════════════════
  # JOB 2: OWASP ZAP SECURITY SCAN
  # ══════════════════════════════════════════════════════
  security-scan:
    name: "🛡️ OWASP ZAP Security Scan"
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start Local HTTP Server
        run: |
          npm install -g http-server
          http-server . -p 8090 &
          sleep 3
          echo "✅ Local server running at http://localhost:8090"

      - name: Pull ZAP Docker image
        run: docker pull ghcr.io/zaproxy/zaproxy:stable -q

      - name: Create ZAP reports directory
        run: |
          mkdir -p zap-reports
          chmod 777 zap-reports

      - name: Run OWASP ZAP Baseline Scan
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/zap-reports:/zap/wrk/:rw \
            -v ${{ github.workspace }}/.zap:/zap/rules/:ro \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:8090/index.html \
              -r report_html.html \
              -J report_json.json \
              -w report_md.md \
              -c /zap/rules/rules.tsv \
              -a \
              -I
          echo "✅ ZAP scan complete"

      - name: Show ZAP scan summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🛡️  OWASP ZAP Scan Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ -f zap-reports/report_md.md ]; then
            grep -E "FAIL-NEW|WARN-NEW|PASS" zap-reports/report_md.md | tail -5 || true
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Upload ZAP Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: zap-reports/
          retention-days: 14
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════
  # JOB 3: DEPLOY TO EC2
  # ══════════════════════════════════════════════════════
  deploy:
    name: "🚀 Deploy to EC2"
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t ed25519 -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy HTML file to EC2
        run: |
          echo "🚀 Deploying Summarizer-AI to EC2..."
          scp -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            index.html \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_DEPLOY_PATH }}
          echo "✅ Deployment complete!"

      - name: Verify Deployment
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "ls -lh ${{ secrets.EC2_DEPLOY_PATH }}/index.html && echo '✅ File is live on EC2!'"

  # ══════════════════════════════════════════════════════
  # JOB 4: SECURITY HARDENING
  # Fixes vulnerabilities found by ZAP on EC2
  # ══════════════════════════════════════════════════════
  harden:
    name: "🔒 Security Hardening"
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Setup SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t ed25519 -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Apply Security Hardening on EC2
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  🔒 Applying Security Hardening..."
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            NGINX_CONF="/etc/nginx/sites-available/default"

            # ── FIX 1: Block .git directory access ──────────
            echo "▶ Blocking .git exposure..."
            if ! sudo grep -q "location ~ /\\.git" "$NGINX_CONF"; then
              sudo sed -i '/server_name _;/a\\n\t# Block .git directory\n\tlocation ~ /\\.git {\n\t\tdeny all;\n\t\treturn 404;\n\t}' "$NGINX_CONF"
              echo "  ✅ .git access blocked"
            else
              echo "  ✅ .git rule already exists"
            fi

            # ── FIX 2: Add X-Frame-Options header (Clickjacking) ──
            echo "▶ Adding X-Frame-Options header..."
            if ! sudo grep -q "X-Frame-Options" "$NGINX_CONF"; then
              sudo sed -i '/server_name _;/a\\n\t# Security Headers\n\tadd_header X-Frame-Options "SAMEORIGIN" always;' "$NGINX_CONF"
              echo "  ✅ X-Frame-Options header added"
            else
              echo "  ✅ X-Frame-Options already set"
            fi

            # ── FIX 3: Add X-Content-Type-Options header ─────
            echo "▶ Adding X-Content-Type-Options header..."
            if ! sudo grep -q "X-Content-Type-Options" "$NGINX_CONF"; then
              sudo sed -i '/server_name _;/a\\tadd_header X-Content-Type-Options "nosniff" always;' "$NGINX_CONF"
              echo "  ✅ X-Content-Type-Options header added"
            else
              echo "  ✅ X-Content-Type-Options already set"
            fi

            # ── FIX 4: Add Content Security Policy header ────
            echo "▶ Adding Content-Security-Policy header..."
            if ! sudo grep -q "Content-Security-Policy" "$NGINX_CONF"; then
              sudo sed -i '/server_name _;/a\\tadd_header Content-Security-Policy "default-src '\''self'\''; script-src '\''self'\'' '\''unsafe-inline'\'' https://fonts.googleapis.com; style-src '\''self'\'' '\''unsafe-inline'\'' https://fonts.googleapis.com; font-src '\''self'\'' https://fonts.gstatic.com;" always;' "$NGINX_CONF"
              echo "  ✅ CSP header added"
            else
              echo "  ✅ CSP already set"
            fi

            # ── FIX 5: Add Permissions-Policy header ─────────
            echo "▶ Adding Permissions-Policy header..."
            if ! sudo grep -q "Permissions-Policy" "$NGINX_CONF"; then
              sudo sed -i '/server_name _;/a\\tadd_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;' "$NGINX_CONF"
              echo "  ✅ Permissions-Policy header added"
            else
              echo "  ✅ Permissions-Policy already set"
            fi

            # ── Validate and Reload Nginx ─────────────────────
            echo "▶ Validating Nginx config..."
            sudo nginx -t && sudo systemctl reload nginx
            echo "  ✅ Nginx reloaded successfully"

            # ── Verify .git is now blocked ────────────────────
            echo "▶ Verifying .git is blocked..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/.git/config)
            if [ "$STATUS" = "404" ]; then
              echo "  ✅ .git access confirmed BLOCKED (404)"
            else
              echo "  ⚠️  .git returned HTTP $STATUS — check Nginx config"
            fi

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  🔒 Security Hardening Complete!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          EOF

      - name: Hardening Success
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ All Security Fixes Applied!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🔒 .git directory   → BLOCKED"
          echo "  🔒 X-Frame-Options  → SAMEORIGIN"
          echo "  🔒 X-Content-Type   → nosniff"
          echo "  🔒 CSP Header       → Applied"
          echo "  🔒 Permissions      → Restricted"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
