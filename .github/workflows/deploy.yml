name: Summarizer-AI — DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ══════════════════════════════════════════════════════
  # JOB 1: HTML VALIDATION
  # ══════════════════════════════════════════════════════
  validate:
    name: "🔍 HTML Validation"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Run HTML Validation
        run: |
          echo "🔍 Validating HTML file..."
          html-validate index.html
          echo "✅ HTML validation passed!"

  # ══════════════════════════════════════════════════════
  # JOB 2: OWASP ZAP SECURITY SCAN
  # ══════════════════════════════════════════════════════
  security-scan:
    name: "🛡️ OWASP ZAP Security Scan"
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start Local HTTP Server
        run: |
          npm install -g http-server
          http-server . -p 8090 &
          sleep 3
          echo "✅ Local server running at http://localhost:8090"

      # ── FIX: Grant write permissions so ZAP Docker can write zap.yaml ──
      - name: Fix workspace permissions for ZAP
        run: chmod -R 777 ${{ github.workspace }}

      # ── Pre-create report files with open permissions ──
      - name: Pre-create ZAP report files
        run: |
          touch report_json.json report_md.md report_html.html
          chmod 666 report_json.json report_md.md report_html.html

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8090/index.html'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          allow_issue_writing: false
          fail_action: false

      # ── FIX: Use hyphen in artifact name (no underscores) ──
      - name: Upload ZAP Scan Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report        # ← hyphen, not underscore
          path: |
            report_html.html
            report_json.json
            report_md.md
          retention-days: 14

      - name: Security Scan Summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🛡️  OWASP ZAP Scan Complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  📄 Reports saved as pipeline artifacts"
          echo "  🔗 Check the Actions tab → Artifacts"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ══════════════════════════════════════════════════════
  # JOB 3: DEPLOY TO EC2
  # ══════════════════════════════════════════════════════
  deploy:
    name: "🚀 Deploy to EC2"
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy HTML file to EC2
        run: |
          echo "🚀 Deploying Summarizer-AI to EC2..."
          scp -i ~/.ssh/id_rsa \
            index.html \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_DEPLOY_PATH }}
          echo "✅ Deployment complete!"

      - name: Verify Deployment
        run: |
          echo "🔎 Verifying deployment on EC2..."
          ssh -i ~/.ssh/id_rsa \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "ls -lh ${{ secrets.EC2_DEPLOY_PATH }}/index.html && echo '✅ File is live on EC2!'"

      - name: Deployment Success Summary
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🎉 Summarizer-AI Deployed Successfully!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Host        : ${{ secrets.EC2_HOST }}"
          echo "  Deploy Path : ${{ secrets.EC2_DEPLOY_PATH }}"
          echo "  Triggered by: ${{ github.actor }}"
          echo "  Commit SHA  : ${{ github.sha }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Deployment Failure Alert
        if: failure()
        run: echo "❌ Deployment FAILED. Check the logs above."
