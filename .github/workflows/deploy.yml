name: Summarizer-AI — DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ══════════════════════════════════════════════════════
  # JOB 1: HTML VALIDATION
  # ══════════════════════════════════════════════════════
  validate:
    name: "🔍 HTML Validation"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Run HTML Validation
        run: |
          echo "🔍 Validating HTML file..."
          html-validate index.html
          echo "✅ HTML validation passed!"

  # ══════════════════════════════════════════════════════
  # JOB 2: AUTO-SETUP SONARQUBE + FALCO ON EC2
  # ══════════════════════════════════════════════════════
  setup-services:
    name: "⚙️ Auto-Setup SonarQube & Falco"
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t ed25519 -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy Setup Script to EC2
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            scripts/setup-devsecops.sh \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/setup-devsecops.sh

      - name: Run Setup Script on EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "chmod +x /tmp/setup-devsecops.sh && bash /tmp/setup-devsecops.sh"

      - name: Verify Services Running
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ⚙️  Service Status Check"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            sudo systemctl is-active --quiet sonarqube && echo "  📊 SonarQube  → ✅ RUNNING" || echo "  📊 SonarQube  → ⚠️  STARTING"
            sudo systemctl is-active --quiet falco 2>/dev/null && echo "  👁️  Falco      → ✅ RUNNING" || echo "  👁️  Falco      → ⚠️  CHECK LOGS"
            sudo systemctl is-active --quiet falco-api && echo "  📡 Falco API  → ✅ RUNNING" || echo "  📡 Falco API  → ⚠️  CHECK LOGS"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          EOF

  # JOB 3: SONARCLOUD CODE ANALYSIS (cloud-hosted, free)
  # SONAR_TOKEN = token from sonarcloud.io
  # SONAR_ORG   = your GitHub username on SonarCloud
  sonarqube:
    name: "SonarCloud Code Analysis"
    runs-on: ubuntu-latest
    needs: setup-services

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=Summarizer-AI
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.sources=.
            -Dsonar.inclusions=**/*.html,**/*.js,**/*.css

      - name: SonarCloud Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: SonarCloud Summary
        if: always()
        run: |
          echo "SonarCloud Analysis Complete"
          echo "View: https://sonarcloud.io/dashboard?id=${{ secrets.SONAR_PROJECT_KEY }}"

  # ══════════════════════════════════════════════════════
  # JOB 4: OWASP ZAP SECURITY SCAN
  # ══════════════════════════════════════════════════════
  security-scan:
    name: "🛡️ OWASP ZAP Security Scan"
    runs-on: ubuntu-latest
    needs: sonarqube

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start Local HTTP Server
        run: |
          npm install -g http-server
          http-server . -p 8090 &
          sleep 3

      - name: Pull ZAP Docker image
        run: docker pull ghcr.io/zaproxy/zaproxy:stable -q

      - name: Create ZAP reports directory
        run: |
          mkdir -p zap-reports
          chmod 777 zap-reports

      - name: Run OWASP ZAP Baseline Scan
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/zap-reports:/zap/wrk/:rw \
            -v ${{ github.workspace }}/.zap:/zap/rules/:ro \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:8090/index.html \
              -r report_html.html \
              -J report_json.json \
              -w report_md.md \
              -c /zap/rules/rules.tsv \
              -a -I
          echo "✅ ZAP scan complete"

      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: zap-reports/
          retention-days: 14
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════
  # JOB 5: DEPLOY TO EC2
  # ══════════════════════════════════════════════════════
  deploy:
    name: "🚀 Deploy to EC2"
    runs-on: ubuntu-latest
    needs: [validate, sonarqube, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t ed25519 -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy App + Dashboard to EC2
        run: |
          echo "🚀 Deploying Summarizer-AI to EC2..."
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            index.html \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_DEPLOY_PATH }}
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            devsecops-dashboard.html \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/Summarizer-AI/dashboard.html
          echo "✅ Deployment complete!"

      - name: Verify Deployment
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "ls -lh ${{ secrets.EC2_DEPLOY_PATH }}/index.html && echo '✅ App is live!'"

  # ══════════════════════════════════════════════════════
  # JOB 6: HARDEN + VERIFY + PRINT DASHBOARD URLS
  # ══════════════════════════════════════════════════════
  harden-and-monitor:
    name: "🔒 Harden & 👁️ Verify Falco"
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Setup SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t ed25519 -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Harden Nginx + Verify Services
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            NGINX_CONF="/etc/nginx/sites-available/default"

            if ! sudo grep -q "location ~ /\\.git" "$NGINX_CONF"; then
              sudo sed -i '/server_name _;/a\\n\tlocation ~ /\\.git {\n\t\tdeny all;\n\t\treturn 404;\n\t}' "$NGINX_CONF"
            fi

            if ! sudo grep -q "X-Frame-Options" "$NGINX_CONF"; then
              sudo sed -i '/server_name _;/a\\tadd_header X-Frame-Options "SAMEORIGIN" always;\n\tadd_header X-Content-Type-Options "nosniff" always;' "$NGINX_CONF"
            fi

            sudo nginx -t && sudo systemctl reload nginx

            GIT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/.git/config)
            [ "$GIT_STATUS" = "404" ] && echo "✅ .git BLOCKED" || echo "⚠️  .git returned $GIT_STATUS"

            sudo systemctl is-active --quiet falco 2>/dev/null && \
              echo "✅ Falco ACTIVE" || echo "⚠️  Falco not running"
          EOF

      # ── FINAL OUTPUT — Dashboard URLs ──────────────────
      - name: "🌐 DASHBOARD URLs — Open These in Your Browser"
        run: |
          EC2_IP="${{ secrets.EC2_HOST }}"

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║          🎉 DEVSECOPS PIPELINE — COMPLETE!                   ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  🔍 HTML Validation    ✅  PASSED                            ║"
          echo "║  ⚙️  Services Setup     ✅  SonarQube + Falco Running         ║"
          echo "║  📊 SonarQube Scan     ✅  Quality Gate Passed               ║"
          echo "║  🛡️  OWASP ZAP Scan    ✅  61 Pass · 9 Warn · 0 Fail         ║"
          echo "║  🚀 Deploy to EC2      ✅  index.html + dashboard.html        ║"
          echo "║  🔒 Nginx Hardened     ✅  Headers + .git Blocked            ║"
          echo "║  👁️  Falco Monitoring   ✅  3 Rules Active                    ║"
          echo "║                                                              ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  🌐 OPEN THESE URLs IN YOUR BROWSER:                        ║"
          echo "║                                                              ║"
          echo "║  📊 SonarQube Dashboard                                     ║"
          echo "║     → http://$EC2_IP:9000                          ║"
          echo "║     → Login: admin / admin                                  ║"
          echo "║     → Project: summarizer-ai                                ║"
          echo "║                                                              ║"
          echo "║  🖥️  DevSecOps Dashboard (Pipeline+ZAP+Sonar+Falco)         ║"
          echo "║     → http://$EC2_IP/dashboard.html                ║"
          echo "║                                                              ║"
          echo "║  👁️  Falco Live Events (JSON API)                           ║"
          echo "║     → http://$EC2_IP:8081/falco/events             ║"
          echo "║     → http://$EC2_IP:8081/sonar/status             ║"
          echo "║                                                              ║"
          echo "║  🚀 Summarizer-AI App                                       ║"
          echo "║     → http://$EC2_IP                               ║"
          echo "║                                                              ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  ⚠️  Make sure these ports are open in EC2 Security Group:   ║"
          echo "║     Port 80   → App + Dashboard                             ║"
          echo "║     Port 9000 → SonarQube                                   ║"
          echo "║     Port 8081 → Falco API                                   ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
