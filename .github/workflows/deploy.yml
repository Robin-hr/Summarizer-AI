name: Summarizer-AI — DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ══════════════════════════════════════════════════════
  # JOB 1: HTML VALIDATION
  # ══════════════════════════════════════════════════════
  validate:
    name: "🔍 HTML Validation"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Run HTML Validation
        run: |
          echo "🔍 Validating HTML file..."
          html-validate index.html
          echo "✅ HTML validation passed!"

  # ══════════════════════════════════════════════════════
  # JOB 2: OWASP ZAP SECURITY SCAN
  # ══════════════════════════════════════════════════════
  security-scan:
    name: "🛡️ OWASP ZAP Security Scan"
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start Local HTTP Server
        run: |
          npm install -g http-server
          http-server . -p 8090 &
          sleep 3
          echo "✅ Local server running at http://localhost:8090"

      - name: Pull ZAP Docker image
        run: docker pull ghcr.io/zaproxy/zaproxy:stable -q

      - name: Create ZAP reports directory
        run: |
          mkdir -p zap-reports
          chmod 777 zap-reports

      - name: Run OWASP ZAP Baseline Scan
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/zap-reports:/zap/wrk/:rw \
            -v ${{ github.workspace }}/.zap:/zap/rules/:ro \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:8090/index.html \
              -r report_html.html \
              -J report_json.json \
              -w report_md.md \
              -c /zap/rules/rules.tsv \
              -a \
              -I
          echo "✅ ZAP scan complete"

      - name: Show ZAP scan summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🛡️  OWASP ZAP Scan Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ -f zap-reports/report_md.md ]; then
            grep -E "FAIL-NEW|WARN-NEW|PASS" zap-reports/report_md.md | tail -5 || true
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Upload ZAP Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: zap-reports/
          retention-days: 14
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════
  # JOB 3: DEPLOY TO EC2
  # ══════════════════════════════════════════════════════
  deploy:
    name: "🚀 Deploy to EC2"
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Verify key loaded correctly
          echo "▶ Key fingerprint:"
          ssh-keygen -l -f ~/.ssh/id_rsa

          # Add EC2 to known hosts
          ssh-keyscan -t ed25519 -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy HTML file to EC2
        run: |
          echo "🚀 Deploying Summarizer-AI to EC2..."
          scp -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            index.html \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_DEPLOY_PATH }}
          echo "✅ Deployment complete!"

      - name: Verify Deployment
        run: |
          echo "🔎 Verifying deployment on EC2..."
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "ls -lh ${{ secrets.EC2_DEPLOY_PATH }}/index.html && echo '✅ File is live on EC2!'"

      - name: Deployment Success Summary
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🎉 Summarizer-AI Deployed Successfully!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Host        : ${{ secrets.EC2_HOST }}"
          echo "  Deploy Path : ${{ secrets.EC2_DEPLOY_PATH }}"
          echo "  Triggered by: ${{ github.actor }}"
          echo "  Commit SHA  : ${{ github.sha }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Deployment Failure Alert
        if: failure()
        run: echo "❌ Deployment FAILED. Check the logs above."
